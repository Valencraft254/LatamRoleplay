<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca de cuentos</title>

<style>
body{
    margin:0;
    padding:30px;
    background:red;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    color:white;
}

.botones{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

button{
    border:none;
    padding:15px 25px;
    border-radius:15px;
    background:white;
    color:red;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    width:auto;
    min-width:100px;
    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
}

#cuento{
    display:none;
    background:white;
    margin-top:30px;
    padding:20px;
    border-radius:20px;
    max-width:700px;
    margin-left:auto;
    margin-right:auto;
}

.volver{
    margin-top:20px;
}
</style>
</head>
<body>

<h1>Mis Historias</h1>

<div class="botones">

<button onclick="abrirCuento(
'Dora la vieja gorda',
'Dora estaba en el baño con diarrea por comer un pastel de caca era su cumpleaños de 100 años era casi ciega tenia caca en el culito y trato de agarrar papel hasta que lo hagarro pero... era el mapa y se limpio el culito despues tenia manchado el culito asi que agarro papel pero... era papel de lija se limpio y se lastimo el culo le quedó tan lastimado que se puso cicatricure y se le cerro el culito
                   FIN'
)">
Dora la vieja gorda
</button>

<button onclick="abrirCuento(
'El tren mágico',
'Un día apareció un tren misterioso que viajaba entre las estrellas...'
)">
Tren mágico largo
</button>

<button onclick="abrirCuento(
'La isla secreta',
'Existía una isla escondida donde crecían árboles gigantes...'
)">
Isla secreta
</button>

</div>

<div id="cuento">
<h2 id="titulo"></h2>
<p id="texto"></p>

<button class="volver" onclick="volver()">
Volver
</button>
</div>

<script>
function abrirCuento(titulo,texto){
document.querySelector(".botones").style.display="none";
document.getElementById("cuento").style.display="block";

document.getElementById("titulo").innerText=titulo;
document.getElementById("texto").innerText=texto;
}

function volver(){
document.querySelector(".botones").style.display="flex";
document.getElementById("cuento").style.display="none";
}
</script>

</body>
</html>
